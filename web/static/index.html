<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PrivaQuest — Privacy Request</title>
  <style>
    :root { font-family: system-ui, sans-serif; color: #1a1a1a; background: #f6f7f9; }
    body { max-width: 560px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; margin-bottom: .25rem; }
    p.sub { color: #555; margin-top: 0; }
    form { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 1rem; }
    label { display: block; font-size: .9rem; margin: .75rem 0 .25rem; }
    input, select, textarea { width: 100%; padding: .5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { margin-top: 1rem; background: #1f4b99; color: #fff; border: 0; padding: .6rem 1rem; border-radius: 4px; cursor: pointer; }
    .result { margin-top: 1rem; padding: 1rem; background: #e8f5e9; border-radius: 6px; display: none; }
    .error { background: #fdecea; color: #b00020; }
    footer { margin-top: 2rem; font-size: .8rem; color: #666; }
  </style>
</head>
<body>
  <h1>Privacy request</h1>
  <p class="sub">Submit a GDPR / DSGVO / RGPD data subject request. We respond within 30 days.</p>

  <form id="form">
    <label for="locale">Language</label>
    <select id="locale" name="locale">
      <option value="en">English</option>
      <option value="de">Deutsch</option>
      <option value="fr">Français</option>
    </select>

    <label for="type">Request type</label>
    <select id="type" name="type">
      <option value="access">Access my data</option>
      <option value="delete">Delete my data</option>
      <option value="rectify">Correct my data</option>
      <option value="object">Object to processing</option>
    </select>

    <label for="email">Email</label>
    <input id="email" name="email" type="email" required>

    <label for="full_name">Full name</label>
    <input id="full_name" name="full_name" type="text">

    <label for="description">Details (optional)</label>
    <textarea id="description" name="description" rows="4"></textarea>

    <button type="submit">Submit request</button>
  </form>

  <div id="result" class="result"></div>

  <footer>
    Self-hosted with <a href="https://github.com/stefanSmk/privaquest">PrivaQuest</a>.
    Your data stays on the operator's server (EU hosting recommended).
  </footer>

  <script>
    const typeLabels = {
      en: { access: 'Access my data (Art. 15 GDPR)', delete: 'Delete my data (Art. 17 GDPR)', rectify: 'Correct my data (Art. 16 GDPR)', object: 'Object to processing (Art. 21 GDPR)' },
      de: { access: 'Auskunft (Art. 15 DSGVO)', delete: 'Löschung (Art. 17 DSGVO)', rectify: 'Berichtigung (Art. 16 DSGVO)', object: 'Widerspruch (Art. 21 DSGVO)' },
      fr: { access: 'Accès (Art. 15 RGPD)', delete: 'Suppression (Art. 17 RGPD)', rectify: 'Rectification (Art. 16 RGPD)', object: 'Opposition (Art. 21 RGPD)' }
    };

    const locale = document.getElementById('locale');
    const type = document.getElementById('type');

    function refreshTypes() {
      const loc = locale.value;
      const labels = typeLabels[loc];
      [...type.options].forEach(opt => { opt.textContent = labels[opt.value]; });
    }
    locale.addEventListener('change', refreshTypes);
    refreshTypes();

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const result = document.getElementById('result');
      result.style.display = 'none';
      result.classList.remove('error');

      const payload = {
        type: type.value,
        email: document.getElementById('email').value,
        full_name: document.getElementById('full_name').value,
        description: document.getElementById('description').value,
        locale: locale.value
      };

      const res = await fetch('/api/requests', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      result.style.display = 'block';
      if (!res.ok) {
        result.classList.add('error');
        result.textContent = data.error || 'Something went wrong';
        return;
      }
      result.innerHTML = `<strong>${data.message}</strong><br>Reference: <code>${data.reference}</code><br>Due: ${new Date(data.due_at).toLocaleDateString()}`;
    });
  </script>
</body>
</html>
