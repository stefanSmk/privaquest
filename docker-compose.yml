services:
  privaquest:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      BASE_URL: "http://localhost:8080"
      ADMIN_API_KEY: "change-me-admin-key"
      DATABASE_URL: "file:/data/privaquest.db?_pragma=foreign_keys(1)"
    volumes:
      - pq-data:/data

volumes:
  pq-data:
